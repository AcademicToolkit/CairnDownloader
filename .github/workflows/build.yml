name: Build Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Create ZIP package
        run: |
          cd build
          zip -r ../cairn-extension.zip .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: cairn-extension-zip
          path: cairn-extension.zip
